services:
  postgres:
    image: postgres:16-alpine
    container_name: poultry_bos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: poultry_bos
    ports:
      - "5432:5432"
    volumes:
      - poultry_bos_pgdata:/var/lib/postgresql/data

volumes:
  poultry_bos_pgdata:
